name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: logitrack_core

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: logitrack_core/go.mod
          cache-dependency-path: logitrack_core/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  frontend:
    name: Frontend (React/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: logitrack_web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: logitrack_web/package-lock.json

      - name: Install dependencies
        run: npm install && npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
